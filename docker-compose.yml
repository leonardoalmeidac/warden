services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: warden
      POSTGRES_PASSWORD: warden
      POSTGRES_DB: warden
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  warden:
    build: .
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: postgresql+psycopg://warden:warden@db:5432/warden
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - db
    volumes:
      - ./src:/app/src

volumes:
  postgres_data: